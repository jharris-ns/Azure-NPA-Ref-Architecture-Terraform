# ==============================================================================
# Security Scan Workflow
# ==============================================================================
# Runs secret scanning and security static analysis on Terraform files.
# Triggered on push, pull requests to main, and weekly schedule.
# ==============================================================================

name: Security Scan

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  schedule:
    # Weekly scan — Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: true
